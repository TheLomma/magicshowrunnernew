<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Magic Showrunner</title>

  <!-- PWA / iOS Home Screen Icon -->
  <link rel="manifest" href="/magicshowrunnernew/manifest.json">
  <link rel="apple-touch-icon" href="/magicshowrunnernew/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/magicshowrunnernew/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/magicshowrunnernew/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/magicshowrunnernew/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/magicshowrunnernew/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/magicshowrunnernew/favicon-16.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Showrunner">
  <meta name="theme-color" content="#6366f1">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0f0f23; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js" data-type="module"></script>
  <script type="text/babel">
    // Fallback: render after babel loads app.js
    window.addEventListener('load', function() {
      if (window.App) {
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(window.App));
      }
    });
  </script>
</body>
</html>
